<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDTT Premium | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-gold: #fbbf24; 
            --bg-dark: #020617; 
        }
        
        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(251, 191, 36, 0.3);
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #fbbf24, #fef3c7, #f59e0b);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .btn-action {
            position: relative; 
            overflow: hidden; 
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 800; text-transform: uppercase; font-style: italic; font-size: 0.75rem;
        }

        .btn-action:active { transform: scale(0.95); }

        .input-premium {
            background: rgba(2, 6, 23, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; 
            padding: 0.8rem 1rem 0.8rem 3rem; 
            width: 100%; color: white; transition: 0.3s;
        }

        .input-premium:focus { border-color: var(--brand-gold); outline: none; background: rgba(2, 6, 23, 0.8); }

        .result-box { 
            max-height: 0; opacity: 0; overflow: hidden; 
            transition: all 0.5s ease-in-out; 
        }
        
        .result-box.show { max-height: 500px; opacity: 1; margin-top: 1rem; }

        @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-gold { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="py-10 px-4 min-h-screen">

    <div class="max-w-5xl mx-auto space-y-10">
        
        <header class="text-center space-y-3">
            <div class="inline-block p-3 rounded-full bg-yellow-500/10 border border-yellow-500/20 mb-2">
                <i class="fa-solid fa-shield-crown text-yellow-500 text-2xl animate-pulse"></i>
            </div>
            <h1 class="text-5xl md:text-7xl font-black gold-gradient-text uppercase tracking-tighter">
                NDTT PREMIUM
            </h1>
            <p class="text-slate-400 font-medium tracking-widest uppercase text-[10px]">
                Hệ Thống Kích Hoạt Script & NextDNS Tự Động
            </p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <section class="glass-card p-8 border-t-4 border-yellow-500">
                <div class="flex items-center gap-4 mb-6">
                    <i class="fa-solid fa-bolt text-yellow-500 text-2xl"></i>
                    <h2 class="text-xl font-bold uppercase italic">Locket Generator</h2>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="user" placeholder="Tên người dùng (Viết liền)..." class="input-premium">
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-calendar absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="date" id="date" value="2025-01-01" class="input-premium">
                    </div>
                    <button onclick="genLocket()" id="btnLocket" class="btn-action w-full py-4 bg-yellow-500 text-black rounded-xl hover:bg-yellow-400 shadow-lg shadow-yellow-500/20">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Khởi tạo Module
                    </button>
                </div>

                <div id="resLocket" class="result-box">
                    <div class="p-4 bg-black/40 rounded-xl border border-yellow-500/20">
                        <p class="text-[10px] text-yellow-500 mb-2 font-bold uppercase">Link Module của bạn:</p>
                        <code id="locketUrl" class="block text-[11px] text-blue-400 break-all bg-blue-500/5 p-3 rounded-lg mb-3"></code>
                        <div class="flex gap-2">
                            <button onclick="copy('locketUrl')" class="flex-1 py-2 bg-white/5 rounded-lg text-[10px] uppercase font-bold border border-white/10 hover:bg-white/10">Copy</button>
                            <a id="installRocket" href="#" class="flex-1 py-2 bg-blue-600 rounded-lg text-[10px] uppercase font-bold text-center hover:bg-blue-500">Shadowrocket</a>
                        </div>
                    </div>
                </div>
            </section>

            <section class="glass-card p-8 border-t-4 border-blue-500">
                <div class="flex items-center gap-4 mb-6">
                    <i class="fa-solid fa-globe text-blue-500 text-2xl"></i>
                    <h2 class="text-xl font-bold uppercase italic text-blue-400">NextDNS Manager</h2>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <i class="fa-solid fa-fingerprint absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="dns_id" placeholder="ID NextDNS (Ví dụ: abc123)..." class="input-premium">
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="email" id="dns_email" placeholder="Email (Để Admin duyệt Premium)..." class="input-premium">
                    </div>
                    <button onclick="handleNextDNS()" id="btnDNS" class="btn-action w-full py-4 bg-blue-600 text-white rounded-xl hover:bg-blue-500 shadow-lg shadow-blue-500/20">
                        <i class="fa-solid fa-file-export"></i> Tạo Config & Gửi Duyệt
                    </button>
                </div>

                <div id="resDNS" class="result-box">
                    <div class="p-4 bg-black/40 rounded-xl border border-blue-500/20">
                        <textarea id="dnsXml" class="w-full h-24 bg-transparent text-[10px] font-mono text-slate-300 outline-none resize-none mb-3" readonly></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="copy('dnsXml', true)" class="py-2 bg-white/5 rounded-lg text-[10px] uppercase font-bold border border-white/10">Copy XML</button>
                            <a href="https://www.icloud.com/shortcuts/ef6f685318484784940648ad520b5c4f" target="_blank" class="py-2 bg-indigo-600 rounded-lg text-[10px] uppercase font-bold text-center">Cài Shortcuts</a>
                        </div>
                    </div>
                </div>
            </section>

            <section class="glass-card p-8 border-t-4 border-purple-500 md:col-span-2">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div class="space-y-2">
                        <h2 class="text-2xl font-bold uppercase italic text-purple-400">Yêu cầu kích hoạt trực tiếp</h2>
                        <p class="text-xs text-slate-400">Nhập Username để Admin kích hoạt Gold vĩnh viễn trên Server.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <div class="relative flex-1 sm:w-64">
                            <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="text" id="request_user" placeholder="Username Locket..." class="input-premium border-purple-500/30">
                        </div>
                        <button onclick="sendRequestToAdmin()" id="btnRequest" class="btn-action px-8 py-4 bg-purple-600 text-white rounded-xl hover:bg-purple-500">
                            Gửi yêu cầu
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="grid grid-cols-1 sm:grid-cols-3 gap-4 pb-10">
            <a href="https://t.me/NgDanhThanhTrung" target="_blank" class="glass-card p-4 flex items-center justify-center gap-3 text-xs font-bold uppercase hover:text-blue-400">
                <i class="fa-brands fa-telegram text-xl"></i> Hỗ trợ Telegram
            </a>
            <a href="https://ngdanhthanhtrung.github.io/Bank/" target="_blank" class="glass-card p-4 flex items-center justify-center gap-3 text-xs font-bold uppercase hover:text-yellow-500">
                <i class="fa-solid fa-heart text-xl"></i> Donate Admin
            </a>
            <div class="glass-card p-4 flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest opacity-50">
                © 2026 NgDanhThanhTrung
            </div>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-card px-6 py-3 text-[11px] font-bold uppercase opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center gap-3">
        <i id="toast-icon" class="fa-solid fa-circle-check"></i>
        <span id="toast-text">Success!</span>
    </div>

    <script>
        function showToast(msg, type = "success") {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.style.borderColor = type === "error" ? "#ef4444" : "#fbbf24";
            document.getElementById('toast-icon').className = type === "error" ? "fa-solid fa-circle-xmark text-red-500" : "fa-solid fa-circle-check text-yellow-500";
            t.classList.add('opacity-100', '-translate-y-4');
            setTimeout(() => t.classList.remove('opacity-100', '-translate-y-4'), 3000);
        }

        async function genLocket() {
            const u = document.getElementById('user').value.trim();
            const d = document.getElementById('date').value;
            const btn = document.getElementById('btnLocket');
            if (!u) return showToast("Vui lòng nhập Username!", "error");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang đồng bộ GitHub...';
            
            try {
                const res = await fetch('/api/generate', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ user: u, join_date: d }) 
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('locketUrl').innerText = data.url;
                    document.getElementById('installRocket').href = `shadowrocket://config/add/${data.url}`;
                    document.getElementById('resLocket').classList.add('show');
                    showToast("Khởi tạo thành công!");
                } else {
                    showToast(data.error || "Lỗi tạo Module", "error");
                }
            } catch (e) { showToast("Lỗi kết nối Server!", "error"); }
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Khởi tạo Module';
        }

        async function sendRequestToAdmin() {
            const req_user = document.getElementById('request_user').value.trim();
            const btn = document.getElementById('btnRequest');
            if (!req_user) return showToast("Nhập Username!", "error");
            
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            try {
                const res = await fetch('/api/send_request', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: req_user })
                });
                if ((await res.json()).success) showToast("Đã gửi yêu cầu tới Admin!");
            } catch (e) { showToast("Gửi yêu cầu thất bại!", "error"); }
            btn.disabled = false; btn.innerHTML = 'Gửi yêu cầu';
        }

        async function handleNextDNS() {
            const dns_id = document.getElementById('dns_id').value.trim();
            const email = document.getElementById('dns_email').value.trim();
            const btn = document.getElementById('btnDNS');
            if (!dns_id) return showToast("Nhập ID NextDNS!", "error");

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            try {
                const res = await fetch('/api/nextdns_unified', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ dns_id: dns_id, email: email })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('dnsXml').value = data.config;
                    document.getElementById('resDNS').classList.add('show');
                    showToast(email ? "Đã gửi Admin duyệt Premium!" : "Đã tạo Config!");
                }
            } catch (e) { showToast("Lỗi hệ thống!", "error"); }
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-file-export"></i> Tạo Config & Gửi Duyệt';
        }

        function copy(id, isInput = false) {
            const el = document.getElementById(id);
            const text = isInput ? el.value : el.innerText;
            navigator.clipboard.writeText(text).then(() => showToast("Đã sao chép vào bộ nhớ!"));
        }
    </script>
</body>
</html>
